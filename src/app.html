<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#09090b" />

		<!-- PWA -->
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/favicon.png" sizes="32x32" type="image/png" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<!-- Default OG / Twitter tags (pages can override via <svelte:head>) -->
		<meta property="og:site_name" content="Forbetra" />
		<meta property="og:type" content="website" />
		<meta property="og:image" content="https://app.forbetra.com/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="https://app.forbetra.com/og-image.png" />

		<script>
			// Dark mode default, respect user preference later
			if (localStorage.theme === 'light') {
				document.documentElement.classList.remove('dark');
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
